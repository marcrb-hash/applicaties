<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#edf2ed">
  <meta name="description" content="Rustige visuele en auditieve begeleiding om je ademritme te vertragen.">
  <title>Ademruimte</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            mist: '#edf2ed',
            ink: '#263b3a',
            sage: '#789b8c',
            deep: '#3f6f6c',
            blue: '#8faeb7',
            cream: '#f8faf6'
          },
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'sans-serif'] }
        }
      }
    };
  </script>
  <style>
    :root { color-scheme: light; }
    * { -webkit-tap-highlight-color: transparent; }
    html, body { min-height: 100%; }
    body {
      background:
        radial-gradient(circle at 18% 12%, rgba(143,174,183,.20), transparent 30rem),
        radial-gradient(circle at 85% 88%, rgba(120,155,140,.18), transparent 34rem),
        #edf2ed;
    }
    .glass { background: rgba(248,250,246,.74); box-shadow: 0 24px 70px rgba(50,79,74,.09); backdrop-filter: blur(16px); }
    .breath-halo { filter: drop-shadow(0 12px 24px rgba(63,111,108,.20)); }
    .breath-fill { fill: url(#breathGradient); }
    .breath-outline { fill: none; stroke: rgba(63,111,108,.16); stroke-width: 1.5; }
    .orbit { transform-origin: 150px 150px; animation: drift 18s linear infinite; }
    @keyframes drift { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) { .orbit { animation: none; } }
    button, select { touch-action: manipulation; }
    select { background-image: none; }
  </style>
</head>
<body class="min-h-[100svh] font-sans text-ink antialiased selection:bg-sage/20">
  <main class="mx-auto flex min-h-[100svh] w-full max-w-3xl items-center justify-center px-4 py-5 sm:px-8 sm:py-8">
    <section class="glass flex w-full flex-col rounded-[2rem] border border-white/70 px-5 py-6 sm:px-10 sm:py-8" aria-labelledby="app-title">
      <header class="flex items-center justify-between gap-4">
        <div>
          <p class="mb-1 text-[11px] font-medium uppercase tracking-[0.24em] text-deep/65">Jouw rustige moment</p>
          <h1 id="app-title" class="text-xl font-medium tracking-tight sm:text-2xl">Ademruimte</h1>
        </div>
        <button id="muteButton" type="button" aria-pressed="false" aria-label="Geluid dempen" class="group inline-flex h-11 w-11 shrink-0 items-center justify-center rounded-full border border-deep/10 bg-white/50 text-deep transition hover:bg-white/80 focus:outline-none focus-visible:ring-2 focus-visible:ring-deep focus-visible:ring-offset-2 focus-visible:ring-offset-mist">
          <svg id="soundOnIcon" aria-hidden="true" viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H3v6h3l5 4V5Z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.5 5.5a9 9 0 0 1 0 13"/></svg>
          <svg id="soundOffIcon" aria-hidden="true" viewBox="0 0 24 24" class="hidden h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H3v6h3l5 4V5Z"/><path d="m16 9 5 5m0-5-5 5"/></svg>
        </button>
      </header>

      <div class="mt-5 sm:mt-6">
        <label for="rhythmSelect" class="mb-2 block text-xs font-medium tracking-wide text-deep/70">Ademritme</label>
        <div class="relative">
          <select id="rhythmSelect" class="h-12 w-full appearance-none rounded-2xl border border-deep/10 bg-white/55 px-4 pr-11 text-sm font-medium text-ink outline-none transition hover:bg-white/75 focus:border-deep/40 focus:ring-2 focus:ring-deep/15">
            <option value="basic">Kalmerend Basisritme · 4–2–6</option>
            <option value="recovery">Geleidelijk Herstel · 4–6</option>
            <option value="balance">Geavanceerde Balans · 5–2–7</option>
          </select>
          <svg aria-hidden="true" viewBox="0 0 24 24" class="pointer-events-none absolute right-4 top-1/2 h-5 w-5 -translate-y-1/2 text-deep/60" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m7 10 5 5 5-5"/></svg>
        </div>
      </div>

      <div class="flex flex-1 flex-col items-center justify-center py-3 sm:py-5">
        <div class="relative aspect-square w-[min(70vw,19rem)] sm:w-[20rem]">
          <svg class="h-full w-full overflow-visible" viewBox="0 0 300 300" role="img" aria-labelledby="circleTitle circleDesc">
            <title id="circleTitle">Visuele ademgids</title>
            <desc id="circleDesc">De cirkel groeit bij inademen, blijft stil bij vasthouden en krimpt bij uitademen.</desc>
            <defs>
              <linearGradient id="breathGradient" x1="55" y1="45" x2="240" y2="250" gradientUnits="userSpaceOnUse">
                <stop offset="0" stop-color="#9bbab4"/>
                <stop offset=".52" stop-color="#789b8c"/>
                <stop offset="1" stop-color="#668b91"/>
              </linearGradient>
              <radialGradient id="softGlow"><stop offset="0" stop-color="#ffffff" stop-opacity=".30"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/></radialGradient>
            </defs>
            <g class="orbit" opacity=".65">
              <circle cx="150" cy="150" r="137" class="breath-outline" stroke-dasharray="2 12"/>
              <circle cx="150" cy="13" r="2.5" fill="#668b91"/>
            </g>
            <circle cx="150" cy="150" r="125" class="breath-outline"/>
            <g id="breathCircle" class="breath-halo">
              <circle id="mainCircle" cx="150" cy="150" r="62" class="breath-fill"/>
              <circle id="glowCircle" cx="128" cy="120" r="50" fill="url(#softGlow)" opacity=".7"/>
            </g>
            <text id="countdown" x="150" y="153" text-anchor="middle" dominant-baseline="middle" fill="#f8faf6" font-size="52" font-weight="400" style="font-variant-numeric: tabular-nums">4</text>
            <text x="150" y="187" text-anchor="middle" fill="#f8faf6" fill-opacity=".76" font-size="10" font-weight="500" letter-spacing="2">SECONDEN</text>
          </svg>
        </div>

        <div class="-mt-1 text-center sm:-mt-2">
          <p id="stateText" aria-live="polite" class="text-lg font-medium tracking-tight sm:text-xl">Adem in via de neus</p>
          <p id="helperText" class="mt-1 text-sm text-deep/60">Laat je buik rustig meebewegen</p>
        </div>
      </div>

      <footer class="mt-3">
        <button id="startButton" type="button" aria-pressed="false" class="flex h-14 w-full items-center justify-center gap-3 rounded-2xl bg-deep px-6 text-base font-medium text-cream shadow-[0_12px_28px_rgba(63,111,108,.22)] transition hover:bg-[#365f5c] active:scale-[.99] focus:outline-none focus-visible:ring-2 focus-visible:ring-deep focus-visible:ring-offset-2 focus-visible:ring-offset-mist">
          <svg id="playIcon" aria-hidden="true" viewBox="0 0 24 24" class="h-5 w-5" fill="currentColor"><path d="M8 5.5v13l10-6.5L8 5.5Z"/></svg>
          <svg id="pauseIcon" aria-hidden="true" viewBox="0 0 24 24" class="hidden h-5 w-5" fill="currentColor"><path d="M7 5h3.5v14H7V5Zm6.5 0H17v14h-3.5V5Z"/></svg>
          <span id="startLabel">Start</span>
        </button>
        <p class="mt-3 text-center text-xs text-deep/50">Adem zonder te forceren en stop als je je onprettig voelt.</p>
      </footer>
    </section>
  </main>

  <script>
    (() => {
      'use strict';

      const rhythms = {
        basic:    { inhale: 4, hold: 2, exhale: 6 },
        recovery: { inhale: 4, hold: 0, exhale: 6 },
        balance:  { inhale: 5, hold: 2, exhale: 7 }
      };

      const phaseCopy = {
        inhale: { label: 'Adem in via de neus', helper: 'Laat je buik rustig meebewegen' },
        hold:   { label: 'Vast houden', helper: 'Blijf ontspannen, zonder te persen' },
        exhale: { label: 'Adem rustig uit', helper: 'Maak de uitademing zacht en lang' }
      };

      const minRadius = 62;
      const maxRadius = 118;
      const els = {
        circle: document.getElementById('mainCircle'),
        glow: document.getElementById('glowCircle'),
        countdown: document.getElementById('countdown'),
        state: document.getElementById('stateText'),
        helper: document.getElementById('helperText'),
        select: document.getElementById('rhythmSelect'),
        start: document.getElementById('startButton'),
        startLabel: document.getElementById('startLabel'),
        play: document.getElementById('playIcon'),
        pause: document.getElementById('pauseIcon'),
        mute: document.getElementById('muteButton'),
        soundOn: document.getElementById('soundOnIcon'),
        soundOff: document.getElementById('soundOffIcon')
      };

      let rhythm = rhythms.basic;
      let phase = 'inhale';
      let phaseElapsed = 0;
      let lastFrame = 0;
      let running = false;
      let muted = false;
      let animationFrame = null;
      let audioContext = null;
      let masterGain = null;
      let lastCueKey = '';

      const easeInOut = t => 0.5 - Math.cos(Math.PI * t) / 2;
      const phaseDuration = name => rhythm[name];

      function nextPhase() {
        if (phase === 'inhale') phase = rhythm.hold > 0 ? 'hold' : 'exhale';
        else if (phase === 'hold') phase = 'exhale';
        else phase = 'inhale';
        updateCopy();
      }

      function radiusForCurrentMoment() {
        const duration = phaseDuration(phase);
        const progress = duration ? Math.min(1, phaseElapsed / duration) : 1;
        if (phase === 'inhale') return minRadius + (maxRadius - minRadius) * easeInOut(progress);
        if (phase === 'hold') return maxRadius;
        return maxRadius - (maxRadius - minRadius) * easeInOut(progress);
      }

      function updateCopy() {
        els.state.textContent = phaseCopy[phase].label;
        els.helper.textContent = phaseCopy[phase].helper;
      }

      function render() {
        const duration = phaseDuration(phase);
        const radius = radiusForCurrentMoment();
        const remaining = Math.max(0, duration - phaseElapsed);
        els.circle.setAttribute('r', radius.toFixed(2));
        els.glow.setAttribute('r', (radius * 0.79).toFixed(2));
        els.glow.setAttribute('cx', (150 - radius * 0.25).toFixed(2));
        els.glow.setAttribute('cy', (150 - radius * 0.30).toFixed(2));
        const seconds = Math.max(1, Math.ceil(remaining - 0.0001));
        els.countdown.textContent = seconds;
        playSecondCue(seconds);
      }

      function tick(now) {
        if (!running) return;
        if (!lastFrame) lastFrame = now;
        phaseElapsed += Math.max(0, Math.min((now - lastFrame) / 1000, 0.25));
        lastFrame = now;

        let duration = phaseDuration(phase);
        while (phaseElapsed >= duration) {
          phaseElapsed -= duration;
          nextPhase();
          duration = phaseDuration(phase);
        }

        render();
        animationFrame = requestAnimationFrame(tick);
      }

      function ensureAudio() {
        if (audioContext) {
          if (audioContext.state === 'suspended') audioContext.resume();
          return;
        }
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return;
        audioContext = new AudioCtx();
        masterGain = audioContext.createGain();
        const compressor = audioContext.createDynamicsCompressor();
        compressor.threshold.value = -20;
        compressor.knee.value = 16;
        compressor.ratio.value = 5;
        compressor.attack.value = 0.005;
        compressor.release.value = 0.18;
        masterGain.gain.value = muted ? 0 : 0.78;
        masterGain.connect(compressor).connect(audioContext.destination);
      }

      function playTone(frequency, start, duration, type, volume) {
        const oscillator = audioContext.createOscillator();
        const envelope = audioContext.createGain();
        oscillator.type = type;
        oscillator.frequency.setValueAtTime(frequency, start);
        envelope.gain.setValueAtTime(0.0001, start);
        envelope.gain.exponentialRampToValueAtTime(volume, start + 0.025);
        envelope.gain.exponentialRampToValueAtTime(0.0001, start + duration);
        oscillator.connect(envelope).connect(masterGain);
        oscillator.start(start);
        oscillator.stop(start + duration + 0.02);
      }

      function playSecondCue(seconds) {
        if (!running || muted || !audioContext || !masterGain || document.hidden) return;
        const cueKey = `${phase}:${seconds}`;
        if (cueKey === lastCueKey) return;
        lastCueKey = cueKey;

        const now = audioContext.currentTime + 0.008;
        const duration = phaseDuration(phase);
        const step = Math.max(0, duration - seconds);

        if (phase === 'inhale') {
          const frequency = 330 * Math.pow(2, step * 2 / 12);
          playTone(frequency, now, 0.24, 'sine', 0.16);
          playTone(frequency * 2, now, 0.16, 'sine', 0.035);
        } else if (phase === 'hold') {
          playTone(392, now, 0.13, 'triangle', 0.11);
          playTone(392, now + 0.18, 0.13, 'triangle', 0.085);
        } else {
          const endFrequency = 196;
          const startFrequency = 294;
          const progress = duration > 1 ? step / (duration - 1) : 1;
          const frequency = startFrequency + (endFrequency - startFrequency) * progress;
          playTone(frequency, now, 0.34, 'triangle', 0.12);
        }
      }

      function setAudioAudible(audible) {
        if (!audioContext || !masterGain) return;
        masterGain.gain.setTargetAtTime(audible ? 0.78 : 0, audioContext.currentTime, 0.025);
      }

      function setRunning(nextRunning) {
        running = nextRunning;
        els.start.setAttribute('aria-pressed', String(running));
        els.startLabel.textContent = running ? 'Pauze' : (phaseElapsed > 0 ? 'Ga verder' : 'Start');
        els.play.classList.toggle('hidden', running);
        els.pause.classList.toggle('hidden', !running);

        if (running) {
          ensureAudio();
          setAudioAudible(!muted);
          lastCueKey = '';
          render();
          lastFrame = performance.now();
          cancelAnimationFrame(animationFrame);
          animationFrame = requestAnimationFrame(tick);
        } else {
          cancelAnimationFrame(animationFrame);
          lastFrame = 0;
          setAudioAudible(false);
        }
      }

      function reset() {
        setRunning(false);
        rhythm = rhythms[els.select.value];
        phase = 'inhale';
        phaseElapsed = 0;
        updateCopy();
        render();
        els.startLabel.textContent = 'Start';
      }

      els.start.addEventListener('click', () => setRunning(!running));
      els.select.addEventListener('change', reset);
      els.mute.addEventListener('click', () => {
        muted = !muted;
        els.mute.setAttribute('aria-pressed', String(muted));
        els.mute.setAttribute('aria-label', muted ? 'Geluid inschakelen' : 'Geluid dempen');
        els.soundOn.classList.toggle('hidden', muted);
        els.soundOff.classList.toggle('hidden', !muted);
        setAudioAudible(running && !muted);
        if (!muted && running) {
          lastCueKey = '';
          playSecondCue(Number(els.countdown.textContent));
        }
      });

      document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
          setAudioAudible(false);
        } else if (!document.hidden && running) {
          lastFrame = performance.now();
          setAudioAudible(!muted);
          lastCueKey = '';
          render();
        }
      });

      render();
    })();
  </script>
</body>
</html>
